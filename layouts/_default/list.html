{{ define "main" }}

<section>
    <div class="container">
        <div class="blog-list-header">
            <a href="/" class="back-link">← Home</a>
            <div class="section-label reveal">Blog</div>
            <h2 class="section-title reveal reveal-delay-1">All Posts</h2>
        </div>
        <div class="blog-grid">
            {{ range .Pages }}
            <a href="{{ .Permalink }}" class="blog-card reveal">
                <div class="blog-card-img">{{ with .Params.emoji }}{{ . }}{{ else }}📝{{ end }}</div>
                <div class="blog-card-body">
                    <div class="blog-date">{{ .Date.Format "Jan 2006" }}</div>
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Summary }}</p>
                </div>
            </a>
            {{ end }}
        </div>
    </div>
</section>

{{ end }}
